version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "5000:3000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/study-tracker
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27019:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
