services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "5000:4000"
    env_file:
      - ./backend/.env.production
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "4173:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27019:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
